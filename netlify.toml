# Netlify config for DamiLlami Backlog
# Routes /api/* requests to serverless functions

[build]
  publish = "."
  functions = "netlify/functions"

# Pretty URLs: /api/igdb -> /.netlify/functions/igdb
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Cache headers
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Service worker should never be cached so updates roll out fast
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
